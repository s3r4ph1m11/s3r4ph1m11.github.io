  <script>
    const posts = [
      {
        id: "bard",
        title: "Bard's Memorial",
        date: "Monday, July 6 2026",
        body: [
          "My last post spoke about the experience of grief. It’s an experience that lingers in the human psyche, and returns in symbols over and over again. As humans, we want to believe that the dead are not entirely gone. The feeling of loss can be so great that we look for proof everywhere and anywhere that death is not final. In this post I’ll continue on this theme, as I’d like to recount my experience of attending Dale Bard’s memorial service in Bishop this June.",
          "Rock climbing is often described as a lifestyle, and that is a huge part of what drew me into it so completely. As climbers, we are constantly asked why we choose this particular, and often fraught life. What does it give us? What does it cost? What kind of person does it turn us into? Even the fact that I can say “climbers” and mean a recognizable group of people, with their own values, habits, language even, proves that climbing is more than a hobby. It is a lifestyle.",
          "But climbing characterizes a certain style of life the very same way it characterizes a certain style of death.",
          "If you surround yourself with the most committed, hardcore, bold climbers, you will eventually find yourself surrounded by untimely death. Maybe not always close enough to feel entitled to the grief, but close enough that the pattern becomes impossible to ignore. This is a reality many climbers come to grips with sooner or later. For me, this season has been one of those moments. There have been several deaths in and around the communities I move through. Some people I knew, some people I only knew of. Dale Bard belonged to that second category. I had never met him, yet I knew a lot about him, and we shared ‘the lifestyle’.",
          "Still, his death feels connected to questions that has been circling me for years: What kind of life does climbing create? Is it a good life? And what remains once that life is over?",
               {
            type: "image-row",
            images: [
              {
                src: "davedale.JPG",
                caption: "Dale Bard on Sea of Dreams, photo Dave Diegelman."
              }
            ]
          },          
          "Dale did not die in the mountains. He died of cancer at age 71, on October 1st 2025. Eerily, on that same day, Balin Miller (a young up-and-comer alpinist) rappelled off the end of his rope while topping out ‘Sea of Dreams’, one of Dale’s signature big-wall first ascents on El Cap. On that particular day I had just left Squamish for the winter and was driving down to the Valley. I read the headlines and immediately called my mentor, Doug Robinson, to see if he had heard the news. Dale had just attended Doug’s 80th birthday party after all, in June of that same year, albeit in a wheelchair and rather frail-looking. Of course, Doug already knew about what had happened.",
          "In February 2026 I climbed Transporter Room, one of Dale’s notorious highballs in Bishop. I did it in honour of Dale. I then wrote an article about the history of the line, and Dale’s lasting impact in the Buttermilk. I sent it to Doug to review, before pitching it to a couple climbing mags for publishing.",
          "Doug then asked if I would come to Dale’s memorial service, held in the Buttermilks on June 6th, 2026, and read some of what I had written about Dale in front of his loved ones. So I drove all the way from Squamish to Bishop, a twenty-hour trip, in two days. We stayed for three days, then turned around and drove back for another two, making the whole thing a week-long pilgrimage. All my friends called me crazy, but I didn’t care. I brought along my friend Naynay, who was looking for a reason to escape Squamish for a bit, and we split the driving.",
          "We drove into the Buttermilks late the night of June 5th, and set up camp next to McGee creek along with our friend Ando Foster, who had been living out there since the winter. The mayor of the Buttermilks’ winter camp known as the ‘Square Lot’, and the last man standing into the hot season. The scene would have been idyllic if we weren’t so exhausted. The cool desert night breeze moved the branches of the trees and bushes over sand illuminated by clear moonlight, and sounds of the creek could be heard somewhere in the background.",
          "The heat of the morning sun woke us early the next day. My group of friends and I drove up to the bathrooms, where the memorial was set to be held. (If you know the Buttermilks, this is near the birthday boulders parking).",
          "Already, the scene was beginning to look like a list of who’s who of climbing’s all-time greats. Lynn Hill was helping David Yerian set up a large canopy, Andy Selters was unpacking folding chairs from a u-haul with Dave Diegelman. Eventually, someone arrived with a stack of nametags and a pen. My friends and I quietly challenged each other to identify as many names in the crowd as we could. We watched as Ron Kauk, Dean Fidelman, Peter Croft, Mari Gingery, Mike Lechlinksy, Rick Accomazzo, and many more settled into their seats.", 
           {
            type: "image-row",
            images: [
              {
                src: "rkand.JPG",
                caption: "Mike Lechlinski, Ron Kauk and Rick Accomazzo. Photo Dave Diegelman."
              },
              {
                src: "PC.JPG",
                caption: "Peter Croft. Photo Dave Diegelman."
              }
            ]
          },
          "Someone later called it a Stone Masters reunion, which felt about right.",
          "Joe Lane showed up with several large kegs of beer from the Mountain Rambler. And the real kicker - that famous yellow taco truck in Bishop, Taqueria mi Guadalajara, came rumbling up the road.", 
          {
            type: "image-row",
            images: [
              {
                src: "truck.JPG",
                caption: "Taqueria mi Guadalajara in the Buttermilks."
              },
              {
                src: "truckm.jpg",
                caption: "The taco truck against the Sierra backdrop."
              }
            ]
          },
          "“Now this is one for the books,” my friend Andy Gohlich, a Bishop local, said excitedly. He, and all of the photographer present at the event, pulled out their cameras to snap photos of the taco truck setting up shop against the backdrop of the iconic Sierra mountains. Doug had enticed George - the owner of the taco truck, and his family to bring it up for the memorial a few days prior. Remarkably, in 30 years of living in Bishop, it was George’s first time in the Buttermilk.",
               {
            type: "image-row",
            images: [
              {
                src: "george.JPG",
                caption: "Doug, George, and his family in the Buttermilks."
              }
            ]
          },  
          "My friends and I took our seats, the youngest people in the crowd. Doug walked by our row, and leaned over met to say “You’re speaking right after Lynn Hill.” Andy nudged me as if to say ‘break a leg’.",
               {
            type: "image-row",
            images: [
              {
                src: "lh.JPG",
                caption: "Lynn Hill speaking at Dale's memorial. Photo Dave Diegelman."
              },
              {
                src: "rk.JPG",
                caption: "Ron Kauk speaking at Dale's memorial. Photo Dave Diegelman."
              }
            ]
          },
          
          "The speeches that followed were emotional without ever feeling rehearsed. I won’t transcribe all the speeches here - the whole service was filmed. It is posted on Lynn Hill’s YouTube channel.",
          '<a href="https://www.youtube.com/watch?v=4nBwqmT7dUg" target="_blank" rel="noopener noreferrer">Click here to watch the video of the memorial.</a>',
              {
            type: "image-row",
            images: [
              {
                src: "me.JPG",
                caption: "Me speaking at the memorial."
              }
            ]
          },             
          "As each person stood up to speak, the same portrait of Dale came into focus from different angles. He was the best climbing partner you could ask for: full of boundless energy, unwavering stoke, integrity, and that sharp smile that seemed permanently carved into his face. And of course, there were stories of proud moments that Dale himself kept from the limelight. Lynn Hill made sure to mention his onsight of the Phoenix, Yosemite’s first 5.13 crack climb, in 1978 without the use of Friends or cams, only hexes and nuts.",
          "Jared Ogden, one of Dale’s closest friends and caretaker in his last months, gave the final speech. By the end, what stayed with me most was not any single story, but the portrait of a person they painted. It wasn’t simply a tribute to someone who had climbed the hardest things, though he had climbed plenty of them. It was a tribute to a person who lived in devotion to the thing itself, whatever you want to call it; climbing, adventure, the craft.",
             {
            type: "image-row",
            images: [
              {
                src: "jodr.JPG",
                caption: "Jared Ogden and Doug Robinson at the memorial. Photo Dave Diegelman."
              }
            ]
          },            
          "Dale was a lifer. He was the best of us.",
          "After the speeches, the crowd mingled while enjoying food from the taco truck, paid for by Doug. One by one, the stone masters approached me to thank me for my tribute to their friend.", 
          "A while into the afternoon, Lynn approached me; “I have a job for you Sarah.” In my head, I was thinking ‘Yes Lynn Hill? Anything for you.’ She explained that they had a little of Dale’s ashes with them, and wanted to spread them off the top of one of the boulders he had climbed. “I would do it,” she said, “but I’ve had a few drinks already. Are you sober?” She asked. “I am,” I replied.",
          {
            type: "image-row",
            images: [
              {
                src: "conga.jpg",
                caption: "The scene as we filed down the hill towards Grandpa."
              }
            ]
          },            
          "And so it was decided that I would solo up ‘Advanced Rockcraft’, a 5.8 on the Grandpa Peabody boulder, the largest of the monoliths in the Buttermilks. This is the easiest way up the boulder, and now considered the down climb route. But it is a slab, and very exposed. Quite scary in its own right. I had done it many times before, though. What I had never done however, was spread the ashes of somebody. “I’m nervous,” I whispered to Lynn as we walked down the hill towards the boulder. “It’s 5.8, you’ll be fine.” “Not about the climbing, about spreading the ashes! I don’t know how,” I replied. “Just let the wind take care of it,” she told me. That was good advice.",
             {
            type: "image-row",
            images: [
              {
                src: "dougme.JPG",
                caption: "Doug and I's exchange at the base of the route."
              }
            ]
          }, 
          "Silence gathered at the base of the route. It was now late into the afternoon, and the sun was beginning its retreat beneath the sierras. Lynn handed me a small baggie of the ashes, which I placed into my chalk bag. As I put on my rock shoes, Doug approached the boulder I was sitting on. I don’t think we exchanged any words, but his eyes gave me a knowing look.",
                   {
            type: "image-row",
            images: [
              {
                src: "slabup2.JPG"
              },
              {
                src: "light2.JPG"
              }
            ]
          },         
          "The camera woman filming the whole event, Lizzie Fowler, took her angle as I began to climb the route. At the very same time, the setting sun cast a glowing outline around the arete I was climbing. It was - simply put- magic. At the top of the boulder, I raised a hand full of Dale’s ashes and asked his friends to say their final words to him. Shouts of “Thank you Dale” “Love you Dale” and “Rest in peace Dale” filled the air as the Buttermilk wind whipped his ashes out of my hand. It was as if they had been longing to be free in the boulders again.",
              {
            type: "video",
            src: "ashes.mov",
            size: "medium",
            caption: "The moment the wind released the ashes from my hand."
          },   
          "I down climbed the route as the sun made its final show. At the base there were some tears, laughter, and lots of smiles. It’s how Dale would have wanted it.",      
          "After the emotional crescendo of the day had passed, the conversations wended their usual path among climbers, back toward beta, holds, and first ascents. Lynn wanted to see where the hardest boulders on the Grandpa started, on its steepest Southern face, and so Ando gleefully showed her. I snapped a few photos of Lynn sussing out the holds on Lucid Dreaming (V15) and Devilution (V17). “Gonna project this one next season, Lynn?” We cajoled her.",
                      {
            type: "image-row",
            images: [
              {
                src: "lha.jpg",
                caption: "Lynn sussing the holds on Lucid Dreaming."
              }
            ]
          },       
          "We headed back up to the bathrooms eventually, where Jared came and pulled me aside. Earlier in the day he had asked all the stone masters to sign a big print poster of Dale, which was going to be auctioned off for charity. “You didn’t sign the poster Sarah,” he said, and handed me a sharpie. I signed my name on a carabiner that was in the photo of Dale, the famous one from Sea of Dreams, right next to Ron Kauk’s.",
                {
            type: "image-row",
            images: [
              {
                src: "sod.JPG",
                caption: "The famous photo of Dale on Sea of Dreams by Dave Diegelman. This was the photo on the poster, and copies were also passed out before the speeches."
              }
            ]
          }, 
          "The night merrily continued at Andy’s place with his girlfriend Paloma, who made Naynay and I a delicious whitefish dinner.",
          "We resumed our campsite at McGee creek that night. The next morning we awoke and I drove the able-bodied dirtbags back up to the site of the memorial to help take down the tent and pack up the chairs. Dave Yerian was there helping pack up, and introduced himself to all the friends I had brought with me. Someone eventually clued in… Yerian, as in, the Bachar-Yerian?",
          "Yup, we opened that can of worms right then and there. Okay, I might have instigated it.",
          "As it happened, Mike Lechlinski was also present that morning. Dave Yerian started apologizing profusely to Mike - who Bachar was supposed to climb the B-Y with. Yes, it might have been called the Bachar-Lechlinski had things gone differently. Mike and his wife, Mari Gingery, spoke about how they had returned late from a trip the night before Mike was supposed to climb with John, and so missed their morning call time. John turned to Dave to be his climbing partner instead, and thus was born the Bachar-Yerian. “I’m sorry man, I didn’t know he was supposed to climb with you, if I had known I would never have gone with him,” Dave kept apologizing to Mike. But Mike simply smiled. The whole affair didn’t seem to bother him much at all. “The story I was told,” I piped in, “was that Bachar was afraid you [Mike] would snake the first ascent from him, because you were too good of a slab climber.” Mike remained silent, but Mari turned to me and said “there may be some truth to that” with a grin.",
          "Because I had just climbed Peace the previous fall, I asked Dave if he knew anything about the fight Kauk and Bachar had about rap-bolting. Dave recounted an altercation he had with Ron, where he confronted him about the bolting he was doing right next to the B-Y; “I don’t give a fuck about the Bachar Yerian!” He claimed Ron shouted at him. Dave then drew a line in the sand with his foot, right there in front of everyone. He said “and that’s when I said to Ron, here’s the line man, and I’m not crossing it. I’m not on your side anymore!”",
          "A little piece of behind-the-curtain climbing history there, for you.",
          "We finished the packing up, and said our goodbyes to people as they returned to wherever home was for them. Lynn invited us back to her campsite, which she shared with Mike and Mari and a few others, to give us some parting gifts. When we met her there, she arrived carrying a t-shirt with a print of her iconic ‘It goes boys!’ quote after her first free ascent of the Nose. As we were about to leave, she asked “You kids want some weed?” I don’t smoke, but Ando and Naynay in the back of my van acquiesced enthusiastically. A few minutes later, Mike walked back over carrying a paper coffee cup in his hand. As he removed his hand from the cup, it revealed that the cup was full to the brim with weed. The boys were super stoked. We thanked them again, and went on our way.",
          "A day later, it was our turn to part ways with the Eastern Sierra again. Doug met us on the corner of the highway on our way out of the ‘Milks to say goodbye. While we chatted, a large, shiny beetle flew around our heads.",
          "“Hi Dale,” Doug said.",
          "One more guardian angel to add to the books.",
          "The memorial felt once in a lifetime, and that is exactly what I wrote in my journal that night. It was undeniably special, one of those days with an almost-magic quality to it. The experience has lingered with me, I think because it has provided some much-needed answers to the questions that keep me up at night.",        
          "Does climbing create a good life, a person worth celebrating? In Dale Bard, it certainly did.",
          "And if June 6th was any indication of what that life leaves in its wake once it is gone, then I have only one thing to say:",
          "I'm all in.",
                            {
            type: "image-row",
            images: [
                   {
                src: "slabdave.JPG",
                caption: "Photo Dave Diegelman."
              },
              {
                src: "ashes.JPG",
                caption: "Photo Dave Diegelman."
              }            
            ]
          }  
        ]
      },
      {
        id: "guardian-angels",
        title: "Guardian Angels",
        date: "Friday, June 19 2026",

    const postList = document.querySelector("#postList");
    const searchInput = document.querySelector("#search");
    const emptyState = document.querySelector("#emptyState");

    function escapeHtml(value) {
      return value.replace(/[&<>"']/g, character => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[character]));
    }

function postContent(item) {
  if (typeof item === "string") {
    return `<p>${item}</p>`;
  }

  if (item.type === "image") {
    const sizeClass = ["small", "medium", "full"].includes(item.size) ? ` is-${item.size}` : "";
    return `
      <figure class="post-image${sizeClass}">
        <img src="${escapeHtml(item.src)}" alt="${escapeHtml(item.alt || "")}" loading="lazy">
        ${item.caption ? `<figcaption>${escapeHtml(item.caption)}</figcaption>` : ""}
      </figure>
    `;
  }

  if (item.type === "video") {
    const sizeClass = ["small", "medium", "full"].includes(item.size) ? ` is-${item.size}` : "";
    return `
      <figure class="post-image${sizeClass}">
        <video controls playsinline>
          <source src="${escapeHtml(item.src)}" type="video/mp4">
        </video>
        ${item.caption ? `<figcaption>${escapeHtml(item.caption)}</figcaption>` : ""}
      </figure>
    `;
  }

  if (item.type === "image-row") {
    const sizeClass = item.size === "full" ? " is-full" : "";
    const countClass = item.images.length === 3 ? " is-three" : "";
    return `
      <div class="post-image-row${sizeClass}${countClass}">
        ${item.images.map(image => `
          <figure>
            <img src="${escapeHtml(image.src)}" alt="${escapeHtml(image.alt || "")}" loading="lazy">
            ${image.caption ? `<figcaption>${escapeHtml(image.caption)}</figcaption>` : ""}
          </figure>
        `).join("")}
      </div>
    `;
  }

  return "";
}
    function postCard(post) {
      return `
        <article class="post-card">
          <p class="post-date">${escapeHtml(post.date)}</p>
          <h2>${escapeHtml(post.title)}</h2>
          <div class="post-body">
            ${post.body.map(postContent).join("")}
          </div>
        </article>
      `;
    }

    function renderPosts(items) {
      postList.innerHTML = items.map(postCard).join("");
      emptyState.classList.toggle("is-visible", items.length === 0);
    }

    function filterPosts() {
      const query = searchInput.value.trim().toLowerCase();
      const filtered = posts.filter(post => {
        const bodyText = post.body.map(item => {
          if (typeof item === "string") return item;
          if (item.type === "image-row") {
            return item.images.map(image => `${image.alt || ""} ${image.caption || ""}`).join(" ");
          }
          return `${item.alt || ""} ${item.caption || ""}`;
        }).join(" ");
        const searchable = `${post.title} ${post.date} ${post.excerpt} ${bodyText}`.toLowerCase();
        return searchable.includes(query);
      });
      renderPosts(filtered);
    }

    searchInput.addEventListener("input", filterPosts);

    renderPosts(posts);
  </script>
