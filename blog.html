<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seraphim's Blog</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #161616;
      --muted: #555555;
      --line: #eeeeee;
      font-family: "Times New Roman", Times, serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #ffffff;
      color: var(--ink);
    }

    input {
      font: inherit;
    }

    .page {
      margin: 0;
      max-width: 900px;
      padding: 32px 40px 60px;
    }

    .title-section {
      align-items: center;
      display: flex;
      gap: 24px;
      justify-content: space-between;
      margin-bottom: 0;
      padding-bottom: 14px;
      position: relative;
    }

    .title-section::after,
    .post-card::after {
      background-image: url("data:image/svg+xml,%3Csvg width='190' height='30' viewBox='0 0 190 30' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 18 C10 16 16 16 23 17 M37 18 C47 21 58 21 69 17 M91 17 C101 14 112 15 122 18 M140 18 C151 21 163 21 174 17 M184 17 C187 17 189 16 190 16' fill='none' stroke='%23d8d8d8' stroke-width='1.05' stroke-linecap='round'/%3E%3Cpath d='M23 13 l4 -3 l6 2 l2 5 l-3 4 l-6 1 l-5 -3 l-1 -4 z' fill='none' stroke='%23d8d8d8' stroke-width='1.15' stroke-linejoin='round'/%3E%3Cpath d='M27 14 c2 0 4 0 5 -1 M27 19 c2 -1 3 0 5 1' fill='none' stroke='%23d8d8d8' stroke-width='0.65' stroke-linecap='round'/%3E%3Cpath d='M69 9 l8 -4 l10 3 l4 8 l-5 7 l-11 1 l-8 -6 l-1 -6 z' fill='none' stroke='%23d8d8d8' stroke-width='1.3' stroke-linejoin='round'/%3E%3Cpath d='M76 10 c3 1 6 1 9 0 M75 18 c3 -1 6 0 8 3 M85 10 c-2 3 -2 7 0 10' fill='none' stroke='%23d8d8d8' stroke-width='0.75' stroke-linecap='round'/%3E%3Cpath d='M122 14 l5 -2 l5 2 l2 5 l-4 4 l-6 -1 l-4 -3 l-1 -3 z' fill='none' stroke='%23d8d8d8' stroke-width='1.1' stroke-linejoin='round'/%3E%3Cpath d='M126 15 c2 0 3 0 5 -1 M126 20 c2 -1 3 0 4 1' fill='none' stroke='%23d8d8d8' stroke-width='0.6' stroke-linecap='round'/%3E%3Cpath d='M144 19 l3 -2 l4 1 l1 3 l-2 3 l-4 0 l-3 -2 z' fill='none' stroke='%23d8d8d8' stroke-width='1' stroke-linejoin='round'/%3E%3Cpath d='M151 10 l6 -3 l8 3 l3 6 l-4 6 l-9 0 l-6 -5 l-1 -4 z' fill='none' stroke='%23d8d8d8' stroke-width='1.2' stroke-linejoin='round'/%3E%3Cpath d='M156 11 c3 1 5 0 7 -1 M155 18 c3 -1 5 0 7 2 M164 11 c-2 3 -1 6 1 9' fill='none' stroke='%23d8d8d8' stroke-width='0.68' stroke-linecap='round'/%3E%3Cpath d='M38 20 l2 -1 l3 1 l1 2 l-2 2 l-3 0 l-2 -2 z M94 16 l2 -1 l3 1 l1 2 l-2 2 l-3 0 l-2 -2 z M177 17 l2 -1 l3 1 l1 2 l-2 2 l-3 0 l-2 -2 z' fill='none' stroke='%23d8d8d8' stroke-width='0.9' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: repeat-x;
      background-size: 190px 30px;
      bottom: -14px;
      content: "";
      height: 30px;
      left: 0;
      position: absolute;
      right: 0;
    }

    .title-section::after {
      transform: rotate(-0.35deg);
    }

    .title-lockup {
      align-items: center;
      display: flex;
      gap: 18px;
    }

    .title-rocks {
      display: block;
      height: 100px;
      object-fit: contain;
      width: auto;
    }

    h1 {
      font-size: 3.8rem;
      font-weight: 400;
      letter-spacing: 0;
      line-height: 1;
      margin: 0;
    }

    .search {
      max-width: 360px;
      width: min(360px, 45%);
    }

    #search {
      background: transparent;
      border: 1px solid var(--line);
      color: var(--ink);
      font-size: 0.9rem;
      padding: 7px 9px;
      width: 100%;
    }

    #search:focus {
      border-color: var(--ink);
      outline: none;
    }

    .post-list {
      display: grid;
    }

    .post-card {
      padding: 28px 0 28px;
      position: relative;
    }

    .post-card::after {
      transform: rotate(0.2deg);
    }

    .post-date {
      color: var(--muted);
      font-size: 0.84rem;
      margin: 0 0 28px;
    }

    h2 {
      font-size: 1.8rem;
      font-weight: 400;
      letter-spacing: 0;
      line-height: 1.25;
      margin: 0;
    }

    .post-card p {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
      margin: 10px 0 0;
    }

    .post-body {
      margin-top: 12px;
    }

    .post-body p {
      color: var(--ink);
      font-size: 1.15rem;
      line-height: 1.65;
    }

    .post-image {
      margin: 26px 0;
    }

    .post-image img {
      display: block;
      height: auto;
      max-width: 100%;
    }

    .post-image.is-small img {
      max-width: 220px;
      width: 100%;
    }

    .post-image.is-medium img {
      max-width: 420px;
      width: 100%;
    }

    .post-image.is-full img {
      width: 100%;
    }

    .post-image figcaption {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.4;
      margin-top: 8px;
    }

    .post-image-row {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin: 26px 0;
      max-width: 620px;
    }

    .post-image-row img {
      display: block;
      height: auto;
      width: 100%;
    }

    .post-image-row figure {
      margin: 0;
    }

    .post-image-row figcaption {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.4;
      margin-top: 8px;
    }

    .empty-state {
      color: var(--muted);
      display: none;
      padding: 18px 0;
    }

    .empty-state.is-visible {
      display: block;
    }

    @media (max-width: 560px) {
      .page {
        padding: 30px 20px 58px;
      }

      .search {
        width: 100%;
      }

      .title-section {
        align-items: flex-start;
        flex-direction: column;
        gap: 16px;
      }

      .title-rocks {
        height: 74px;
      }

      h1 {
        font-size: 3rem;
      }

      .post-image-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="title-section" data-home-section>
      <div class="title-lockup">
        <h1>Blog</h1>
        <img class="title-rocks" src="title-rocks.png" alt="Two rocks">
      </div>
      <div class="search" aria-label="Search posts">
        <input id="search" type="search" placeholder="Search posts" autocomplete="off">
      </div>
    </section>

    <section data-home-section>
      <div class="post-list" id="postList" aria-live="polite"></div>
      <div class="empty-state" id="emptyState">No posts match that search.</div>
    </section>
  </main>

  <script>
    const posts = [
      {
        id: "guardian-angels",
        title: "Guardian Angels",
        date: "Friday, June 19 2026",
        excerpt: "A meditation on signs, dreams, ravens, painted ladies, and wanting to believe.",
        body: [
          "Though it echoes many of the themes explored in the Dark Wizard, I wrote this piece before it came out, earlier this spring in the Valley.",
          {
            type: "image-row",
            images: [
              {
                src: "IMG_9370.jpg",
                alt: "Journal page 1."
              },
              {
                src: "IMG_9367.jpg",
                alt: "Journal page 2."
              }
            ]
          },
          "Transcript:",
          "'Do you believe in guardian angels?",
          "If so, how do you know when they are with you, watching?",
          "I think I was 11 years old when I was at my dad's funeral. Everyone was handed a small paper envelope. I didn't know what was inside. Butterflies can be frozen and put to sleep. The palms of our hands warmed them up and woke them up inside the envelopes.",
          "Everyone was instructed to open their envelopes at the same time. A painted lady butterfly was in each one, creating a small flurry of them.",
          "Now every time I see a painted lady butterfly, I think of my dad. I have a tattoo on my thigh of a hand releasing a painted lady butterfly. My hand.",
          "Last summer, I was on a ledge with Xavier. A dragonfly hovered around our heads for a few seconds and he said \"Hi mom.\"",
          "I knew immediately what he meant.",
          "For the Greek, ravens were considered messengers from the afterlife to our world. While scrambling in Bishop, it feels like there are always one or two hanging around to watch out for you.",
          "Cardinals are the bird most commonly associated with the presence of a dead relative. My grandmother used to feed cardinals birdseed in her back yard. When she died, I got a tattoo of a cardinal next to the painted lady.",
          "The other day in Bishop, it was very hot out and there were painted ladies everywhere. Then, in the evening, it became very cold, and I found this ↑ painted lady in the door sill of my van, wings shuddering and barely alive. I tried to save it; I fed it some honey and warmed it up in the palm of my hand. It died overnight. That night, I had a dream that every time I tried to open my mouth to speak, painted lady butterflies filled my mouth until I had to spit them out and they would fly away.",
          {
            type: "image-row",
            images: [
              {
                src: "IMG_8125_Original.jpg",
                alt: "A butterfly landed on a finger."
              },
              {
                src: "IMG_8130_Original.jpg",
                alt: "A painted lady butterfly."
              }
            ]
          },
          "I've been having lots of vivid dreams lately. The night before I did Transporter Room I dreamt that Dale Bard came to give me an old pair of his shoes from the after life.",
          "I'm not religious though, and I don't believe in ghosts.",
          "But I think we all, to some extent, have this wish that there is something, or someone beyond this plane of existence that is watching us in solitary times.",
          "I love looking around while alone on a climb, only to make direct eye contact with the keen stare of a raven. It brings solace, and often some bemusement.",
          "And do I believe that painted ladies are literally my dad? No... But also, yes. I like it, and so I want to.",
          "Do I believe that dreams are meaningful, a message being sent to you from the universe? No... But sometimes, mine are. When they make sense or show me something I was missing, what else should I do with them?'",
          {
            type: "image-row",
            images: [
              {
                src: "IMG_9401.jpg",
                alt: "A drawing.",
                caption: "Drawing by James."
              },
              {
                src: "IMG_9402.jpg",
                alt: "A drawing.",
                caption: "Drawing by Maggie."
              }
            ]
          }
        ]
      },
      {
        id: "bard",
        title: "Bard's Memorial",
        date: "June 6, 2026",
        excerpt: "Nil.",
        body: [
          "Nil."
        ]
      }
    ];

    const postList = document.querySelector("#postList");
    const searchInput = document.querySelector("#search");
    const emptyState = document.querySelector("#emptyState");

    function escapeHtml(value) {
      return value.replace(/[&<>"']/g, character => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[character]));
    }

    function postContent(item) {
      if (typeof item === "string") {
        return `<p>${escapeHtml(item)}</p>`;
      }

      if (item.type === "image") {
        const sizeClass = ["small", "medium", "full"].includes(item.size) ? ` is-${item.size}` : "";
        return `
          <figure class="post-image${sizeClass}">
            <img src="${escapeHtml(item.src)}" alt="${escapeHtml(item.alt || "")}">
            ${item.caption ? `<figcaption>${escapeHtml(item.caption)}</figcaption>` : ""}
          </figure>
        `;
      }

      if (item.type === "image-row") {
        return `
          <div class="post-image-row">
            ${item.images.map(image => `
              <figure>
                <img src="${escapeHtml(image.src)}" alt="${escapeHtml(image.alt || "")}">
                ${image.caption ? `<figcaption>${escapeHtml(image.caption)}</figcaption>` : ""}
              </figure>
            `).join("")}
          </div>
        `;
      }

      return "";
    }

    function postCard(post) {
      return `
        <article class="post-card">
          <p class="post-date">${escapeHtml(post.date)}</p>
          <h2>${escapeHtml(post.title)}</h2>
          <div class="post-body">
            ${post.body.map(postContent).join("")}
          </div>
        </article>
      `;
    }

    function renderPosts(items) {
      postList.innerHTML = items.map(postCard).join("");
      emptyState.classList.toggle("is-visible", items.length === 0);
    }

    function filterPosts() {
      const query = searchInput.value.trim().toLowerCase();
      const filtered = posts.filter(post => {
        const bodyText = post.body.map(item => {
          if (typeof item === "string") return item;
          if (item.type === "image-row") {
            return item.images.map(image => `${image.alt || ""} ${image.caption || ""}`).join(" ");
          }
          return `${item.alt || ""} ${item.caption || ""}`;
        }).join(" ");
        const searchable = `${post.title} ${post.date} ${post.excerpt} ${bodyText}`.toLowerCase();
        return searchable.includes(query);
      });
      renderPosts(filtered);
    }

    searchInput.addEventListener("input", filterPosts);

    renderPosts(posts);
  </script>
</body>
</html>
