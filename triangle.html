<!DOCTYPE html>
<html>
<body style="margin:0; padding:20px; background:#ffffff;">

<style>
  .hit-area {
    cursor: grab;
    pointer-events: all;
  }

  .hit-area:active {
    cursor: grabbing;
  }

  .visible-point {
    pointer-events: none;
  }

  #profile-shape {
    pointer-events: none;
  }

  #graph {
    touch-action: none;
    user-select: none;
  }
  h1 {font-family: sans-serif;}
  h2 {
    margin-top: 0px; margin-bottom: 10px;
    text-decoration: underline;
  }
  h3 {padding-bottom: 0px; margin-bottom: 5px; margin-top: 0px; padding-top: 0px;}
  ul {padding-top: 0px; margin-top: 0px;}
  li {padding-top: 0px;margin-top: 0px; font-size: large;}
</style>

<h1>Interactive Fear Matrix</h1>

<div style="font-family:sans-serif; margin-bottom:20px;">
  <input
    id="email"
    type="email"
    placeholder="Email"
    style="font-size:18px; padding:6px; width:220px;"
  />

  <input
    id="password"
    type="password"
    placeholder="Password"
    style="font-size:18px; padding:6px; width:220px; margin-left:10px;"
  />

  <button
    id="sign-up"
    style="font-size:18px; padding:6px 12px; margin-left:10px;"
  >
    Sign Up
  </button>

  <button
    id="sign-in"
    style="font-size:18px; padding:6px 12px; margin-left:10px;"
  >
    Sign In
  </button>
</div>

<div id="auth-status" style="font-family:sans-serif; font-size:18px; margin-top:10px;">
  Not signed in
</div>

<div id="selected-climb" style="font-family:sans-serif; font-size:32px; margin-bottom:15px; font-weight:bold;">
  Climb name: None Selected
</div>

<svg id="graph" width="1000" height="700" style="background:white;">
  <polygon points="450,90 138,630 762,630" fill="lightyellow" stroke="black" stroke-width="2" />

  <text x="450" y="70" text-anchor="middle" font-size="28">Exposure</text>
  <text x="90" y="675" font-size="28">Risk</text>
  <text x="700" y="675" font-size="28">Consequence</text>

  <line x1="450" y1="450" x2="450" y2="90" stroke="black" stroke-width="2" />
  <line x1="450" y1="450" x2="138" y2="630" stroke="black" stroke-width="2" />
  <line x1="450" y1="450" x2="762" y2="630" stroke="black" stroke-width="2" />

  <path id="average-shape" fill="rgba(120, 120, 120, 0.25)" stroke="gray" stroke-width="2" stroke-dasharray="6 6" pointer-events="none"/>
  <path id="profile-shape" fill="rgba(249, 250, 242, 0.75)" stroke="black" stroke-width="1.5"/>

  <!-- Large invisible hit areas -->
  <circle class="hit-area" data-axis="top" cx="450" cy="390" r="55" fill="rgba(0,0,0,0.001)" />
  <circle class="hit-area" data-axis="left" cx="398" cy="480" r="55" fill="rgba(0,0,0,0.001)" />
  <circle class="hit-area" data-axis="right" cx="502" cy="480" r="55" fill="rgba(0,0,0,0.001)" />

  <!-- Small visible dots -->
  <circle class="visible-point" data-axis="top" cx="450" cy="390" r="6" fill="red" />
  <circle class="visible-point" data-axis="left" cx="398" cy="480" r="6" fill="blue" />
  <circle class="visible-point" data-axis="right" cx="502" cy="480" r="6" fill="green" />
</svg>

<div style="margin-top: 20px;">
  <label for="exposure-slider">Exposure:</label>
  <input type="range" id="exposure-slider" min="0" max="100" value="50" style="width: 300px;"/>
  
  <label for="risk-slider">Risk:</label>
  <input type="range" id="risk-slider" min="0" max="100" value="50" style="width: 300px;"/>
  
  <label for="consequence-slider">Consequence:</label>
  <input type="range" id="consequence-slider" min="0" max="100" value="50" style="width: 300px;"/>
</div>

<div id="profile-output" style="margin-top:20px; font-size:32px; font-family:sans-serif; font-weight:bold;">
  Profile:
</div>

<div style="font-family:sans-serif; font-size:24px; margin-top:20px;">
  <label for="climb-name">Add a new climb:</label>
  <input id="climb-name" type="text" style="font-size:22px; padding:6px; margin-left:10px; width:300px;"/>
</div>
  
<button id="save-climb" style="margin-top:20px; font-size:24px; padding:10px 20px; font-family:sans-serif; cursor:pointer;">
  Save
</button>

<div style="font-family:sans-serif; margin-top:25px;">
  <h2>Saved Climbs</h2>
  <div id="saved-climbs"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const selectedClimbText = document.getElementById("selected-climb");
const supabaseUrl = "https://ncpjhlvuwuiqwsixpndj.supabase.co";
const supabaseKey = "YOUR_SUPABASE_KEY_HERE"; // Replace with your actual Supabase key

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
const svg = document.getElementById("graph");
const points = document.querySelectorAll(".hit-area");
const averageShape = document.getElementById("average-shape");
const shape = document.getElementById("profile-shape");
const output = document.getElementById("profile-output");
const climbNameInput = document.getElementById("climb-name");
const saveClimbButton = document.getElementById("save-climb");
const savedClimbsContainer = document.getElementById("saved-climbs");
const authStatus = document.getElementById("auth-status");
const signUpButton = document.getElementById("sign-up");
const signInButton = document.getElementById("sign-in");

const exposureSlider = document.getElementById("exposure-slider");
const riskSlider = document.getElementById("risk-slider");
const consequenceSlider = document.getElementById("consequence-slider");

const center = { x: 450, y: 450 };

const axes = {
  top:   { x: 450, y: 90 },
  left:  { x: 138, y: 630 },
  right: { x: 762, y: 630 }
};

let isDragging = false;
let dragAxis = null;
let activePointerId = null;

signInButton.addEventListener("click", async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    alert(error.message);
  } else {
    authStatus.textContent = "Signed in as " + email;
    alert("Signed in.");
  }
});

points.forEach(point => {
  const axisName = point.dataset.axis;

  point.addEventListener("pointerdown", event => {
    isDragging = true;
    dragAxis = axisName;
    activePointerId = event.pointerId;

    svg.setPointerCapture(event.pointerId);
    document.body.style.cursor = "grabbing";
    event.preventDefault();
  });
});

svg.addEventListener("pointermove", event => {
  if (!isDragging || event.pointerId !== activePointerId) return;

  const rect = svg.getBoundingClientRect();
  const mouse = {
    x: event.clientX - rect.left,
    y: event.clientY - rect.top
  };

  const projected = projectPointOntoAxis(mouse, center, axes[dragAxis]);
  movePoint(dragAxis, projected.x, projected.y);
  updateShape();
});

svg.addEventListener("pointerup", stopDragging);
svg.addEventListener("pointercancel", stopDragging);
svg.addEventListener("lostpointercapture", stopDragging);

function stopDragging() {
  if (activePointerId !== null && svg.hasPointerCapture(activePointerId)) {
    svg.releasePointerCapture(activePointerId);
  }

  isDragging = false;
  dragAxis = null;
  activePointerId = null;
  document.body.style.cursor = "default";
}

saveClimbButton.addEventListener("click", async () => {
  const climbName = climbNameInput.value.trim();

  if (climbName === "") {
    alert("Please enter a climb name.");
    return;
  }

  const { data: userData, error: userError } = await supabaseClient.auth.getUser();

  if (userError || !userData.user) {
    alert("Please sign in before saving.");
    return;
  }

  const { data: climb, error: climbError } = await supabaseClient
    .from("climbs")
    .upsert(
      {
        name: climbName,
        created_by: userData.user.id
      },
      {
        onConflict: "name"
      }
    )
    .select()
    .single();

  if (climbError) {
    alert(climbError.message);
    return;
  }

  const { error } = await supabaseClient
    .from("climb_graphs")
    .insert({
      climb_name: climbName,
      climb_id: climb.id,
      user_id: userData.user.id,
      top: getPoint("top"),
      left_point: getPoint("left"),
      right_point: getPoint("right")
    });

  if (error) {
    alert(error.message);
  } else {
    alert("Climb and graph saved.");
    loadClimbsFromSupabase();
  }
});

async function loadClimbsFromSupabase() {
  const { data, error } = await supabaseClient
    .from("climbs")
    .select("id, name")
    .order("name");

  if (error) {
    alert(error.message);
    return;
  }

  savedClimbsContainer.innerHTML = "";

  data.forEach(climb => {
    const climbButton = document.createElement("button");
    climbButton.textContent = climb.name;
    climbButton.style.fontSize = "20px";
    climbButton.style.padding = "8px 12px";
    climbButton.style.margin = "8px";
    climbButton.style.cursor = "pointer";

    climbButton.addEventListener("click", async () => {
      selectedClimbText.textContent = "Climb name: " + climb.name;

      const { data, error } = await supabaseClient
        .from("climb_graphs")
        .select("top, left_point, right_point")
        .eq("climb_id", climb.id);

      if (error) {
        alert(error.message);
        return;
      }

      if (!data || data.length === 0) {
        alert("No graphs saved for this climb yet.");
        return;
      }

      const avgTop = averagePoints(data.map(row => row.top));
      const avgLeft = averagePoints(data.map(row => row.left_point));
      const avgRight = averagePoints(data.map(row => row.right_point));

      drawAverageShape(avgTop, avgLeft, avgRight);
    });

    savedClimbsContainer.appendChild(climbButton);
  });
}

// Update the graph based on slider values
function updateGraphFromSliders() {
  const exposureValue = Number(exposureSlider.value);
  const riskValue = Number(riskSlider.value);
  const consequenceValue = Number(consequenceSlider.value);

  const newTopY = axes.top.y + ((100 - exposureValue) / 100) * (center.y - axes.top.y);
  const newLeftY = axes.left.y + ((100 - riskValue) / 100) * (center.y - axes.left.y);
  const newRightY = axes.right.y + ((100 - consequenceValue) / 100) * (center.y - axes.right.y);

  movePoint("top", center.x, newTopY);
  movePoint("left", axes.left.x, newLeftY);
  movePoint("right", axes.right.x, newRightY);

  updateShape();
}

// Attach slider event listeners
exposureSlider.addEventListener("input", updateGraphFromSliders);
riskSlider.addEventListener("input", updateGraphFromSliders);
consequenceSlider.addEventListener("input", updateGraphFromSliders);

updateShape();
loadClimbsFromSupabase();

function movePoint(axisName, x, y) {
  const hitArea = document.querySelector(`.hit-area[data-axis="${axisName}"]`);
  const visiblePoint = document.querySelector(`.visible-point[data-axis="${axisName}"]`);

  hitArea.setAttribute("cx", x);
  hitArea.setAttribute("cy", y);
  visiblePoint.setAttribute("cx", x);
  visiblePoint.setAttribute("cy", y);
}

function updateShape() {
  const top = getPoint("top");
  const left = getPoint("left");
  const right = getPoint("right");

  const d = `
    M \${top.x} \${top.y}
    Q \${center.x} \${center.y} \${left.x} \${left.y}
    Q \${center.x} \${center.y} \${right.x} \${right.y}
    Q \${center.x} \${center.y} \${top.x} \${top.y}
    Z
  `;

  shape.setAttribute("d", d);

  const exposure = getAxisLevel(top, axes.top);
  const risk = getAxisLevel(left, axes.left);
  const consequence = getAxisLevel(right, axes.right);

  const profileKey = `${exposure}-${risk}-${consequence}`;

  const profiles = {
    "low-low-low": "Low Intensity",
    "low-low-medium": "Controlled Practice",
    "low-low-high": "Hidden Consequence",
    "low-medium-low": "Casual Lead",
    "low-medium-medium": "Balanced Climbing",
    "low-medium-high": "Serious Fall Potential",
    "low-high-low": "Technical Risk",
    "low-high-medium": "Highball",
    "low-high-high": "Danger Zone",
    "medium-low-low": "Comfortable Exposure",
    "medium-low-medium": "Exposed But Safe",
    "medium-low-high": "Free Solo",
    "medium-medium-low": "Sport Climbing",
    "medium-medium-medium": "All-Around Climbing",
    "medium-medium-high": "Committed Climbing",
    "medium-high-low": "Risky Movement",
    "medium-high-medium": "Bold Climbing",
    "medium-high-high": "Extreme Commitment",
    "high-low-low": "Airy But Safe",
    "high-low-medium": "Exposed Movement",
    "high-low-high": "No-Fall Zone",
    "high-medium-low": "Lead Climbing",
    "high-medium-medium": "Exposed Lead",
    "high-medium-high": "Big Wall",
    "high-high-low": "Unstable Movement",
    "high-high-medium": "Serious Risk",
    "high-high-high": "Maximum Fear"
  };

  output.textContent = `Profile: \${profiles[profileKey]}`;
}

function getPoint(axisName) {
  const point = document.querySelector(`.visible-point[data-axis="${axisName}"]`);
  return {
    x: Number(point.getAttribute("cx")),
    y: Number(point.getAttribute("cy"))
  };
}

function getAxisLevel(point, axisEnd) {
  const dxTotal = axisEnd.x - center.x;
  const dyTotal = axisEnd.y - center.y;

  const dxPoint = point.x - center.x;
  const dyPoint = point.y - center.y;

  const totalDistance = Math.sqrt(dxTotal * dxTotal + dyTotal * dyTotal);
  const pointDistance = Math.sqrt(dxPoint * dxPoint + dyPoint * dyPoint);
  const ratio = pointDistance / totalDistance;

  if (ratio < 0.33) return "low";
  if (ratio < 0.66) return "medium";
  return "high";
}

function drawAverageShape(top, left, right) {
  const d = `
    M \${top.x} \${top.y}
    Q \${center.x} \${center.y} \${left.x} \${left.y}
    Q \${center.x} \${center.y} \${right.x} \${right.y}
    Q \${center.x} \${center.y} \${top.x} \${top.y}
    Z
  `;

  averageShape.setAttribute("d", d);
}

function averagePoints(points) {
  const total = points.reduce(
    (sum, point) => {
      sum.x += point.x;
      sum.y += point.y;
      return sum;
    },
    { x: 0, y: 0 }
  );

  return {
    x: total.x / points.length,
    y: total.y / points.length
  };
}

function projectPointOntoAxis(mouse, start, end) {
  const dx = end.x - start.x;
  const dy = end.y - start.y;

  const lengthSquared = dx * dx + dy * dy;

  let t = ((mouse.x - start.x) *
