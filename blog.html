<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #161616;
      --muted: #555555;
      --line: #eeeeee;
      font-family: "Times New Roman", Times, serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #ffffff;
      color: var(--ink);
    }

    input {
      font: inherit;
    }

    .page {
      margin: 0;
      max-width: 820px;
      padding: 32px 40px 60px;
    }

    .title-section {
      align-items: center;
      display: flex;
      gap: 24px;
      justify-content: space-between;
      margin-bottom: 0;
      padding-bottom: 14px;
      position: relative;
    }

    .title-section::after {
      background-image: url("data:image/svg+xml,%3Csvg width='190' height='30' viewBox='0 0 190 30' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 18 C10 16 16 16 23 17 M37 18 C47 21 58 21 69 17 M91 17 C101 14 112 15 122 18 M140 18 C151 21 163 21 174 17 M184 17 C187 17 189 16 190 16' fill='none' stroke='%23d8d8d8' stroke-width='1.05' stroke-linecap='round'/%3E%3Cpath d='M23 13 l4 -3 l6 2 l2 5 l-3 4 l-6 1 l-5 -3 l-1 -4 z' fill='none' stroke='%23d8d8d8' stroke-width='1.15' stroke-linejoin='round'/%3E%3Cpath d='M27 14 c2 0 4 0 5 -1 M27 19 c2 -1 3 0 5 1' fill='none' stroke='%23d8d8d8' stroke-width='0.65' stroke-linecap='round'/%3E%3Cpath d='M69 9 l8 -4 l10 3 l4 8 l-5 7 l-11 1 l-8 -6 l-1 -6 z' fill='none' stroke='%23d8d8d8' stroke-width='1.3' stroke-linejoin='round'/%3E%3Cpath d='M76 10 c3 1 6 1 9 0 M75 18 c3 -1 6 0 8 3 M85 10 c-2 3 -2 7 0 10' fill='none' stroke='%23d8d8d8' stroke-width='0.75' stroke-linecap='round'/%3E%3Cpath d='M122 14 l5 -2 l5 2 l2 5 l-4 4 l-6 -1 l-4 -3 l-1 -3 z' fill='none' stroke='%23d8d8d8' stroke-width='1.1' stroke-linejoin='round'/%3E%3Cpath d='M126 15 c2 0 3 0 5 -1 M126 20 c2 -1 3 0 4 1' fill='none' stroke='%23d8d8d8' stroke-width='0.6' stroke-linecap='round'/%3E%3Cpath d='M144 19 l3 -2 l4 1 l1 3 l-2 3 l-4 0 l-3 -2 z' fill='none' stroke='%23d8d8d8' stroke-width='1' stroke-linejoin='round'/%3E%3Cpath d='M151 10 l6 -3 l8 3 l3 6 l-4 6 l-9 0 l-6 -5 l-1 -4 z' fill='none' stroke='%23d8d8d8' stroke-width='1.2' stroke-linejoin='round'/%3E%3Cpath d='M156 11 c3 1 5 0 7 -1 M155 18 c3 -1 5 0 7 2 M164 11 c-2 3 -1 6 1 9' fill='none' stroke='%23d8d8d8' stroke-width='0.68' stroke-linecap='round'/%3E%3Cpath d='M38 20 l2 -1 l3 1 l1 2 l-2 2 l-3 0 l-2 -2 z M94 16 l2 -1 l3 1 l1 2 l-2 2 l-3 0 l-2 -2 z M177 17 l2 -1 l3 1 l1 2 l-2 2 l-3 0 l-2 -2 z' fill='none' stroke='%23d8d8d8' stroke-width='0.9' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: repeat-x;
      background-size: 190px 30px;
      bottom: -14px;
      content: "";
      height: 30px;
      left: 0;
      position: absolute;
      right: 0;
      transform: rotate(-0.35deg);
    }

    h1 {
      font-size: 2rem;
      font-weight: 400;
      letter-spacing: 0;
      line-height: 1.2;
      margin: 0;
    }

    .search {
      max-width: 360px;
      width: min(360px, 45%);
    }

    #search {
      background: transparent;
      border: 1px solid var(--line);
      color: var(--ink);
      font-size: 0.9rem;
      padding: 7px 9px;
      width: 100%;
    }

    #search:focus {
      border-color: var(--ink);
      outline: none;
    }

    .post-list {
      display: grid;
    }

    .post-card {
      padding: 12px 0 28px;
      position: relative;
    }

    .post-card::after {
      background-image: url("data:image/svg+xml,%3Csvg width='190' height='30' viewBox='0 0 190 30' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 18 C10 16 16 16 23 17 M37 18 C47 21 58 21 69 17 M91 17 C101 14 112 15 122 18 M140 18 C151 21 163 21 174 17 M184 17 C187 17 189 16 190 16' fill='none' stroke='%23d8d8d8' stroke-width='1.05' stroke-linecap='round'/%3E%3Cpath d='M23 13 l4 -3 l6 2 l2 5 l-3 4 l-6 1 l-5 -3 l-1 -4 z' fill='none' stroke='%23d8d8d8' stroke-width='1.15' stroke-linejoin='round'/%3E%3Cpath d='M27 14 c2 0 4 0 5 -1 M27 19 c2 -1 3 0 5 1' fill='none' stroke='%23d8d8d8' stroke-width='0.65' stroke-linecap='round'/%3E%3Cpath d='M69 9 l8 -4 l10 3 l4 8 l-5 7 l-11 1 l-8 -6 l-1 -6 z' fill='none' stroke='%23d8d8d8' stroke-width='1.3' stroke-linejoin='round'/%3E%3Cpath d='M76 10 c3 1 6 1 9 0 M75 18 c3 -1 6 0 8 3 M85 10 c-2 3 -2 7 0 10' fill='none' stroke='%23d8d8d8' stroke-width='0.75' stroke-linecap='round'/%3E%3Cpath d='M122 14 l5 -2 l5 2 l2 5 l-4 4 l-6 -1 l-4 -3 l-1 -3 z' fill='none' stroke='%23d8d8d8' stroke-width='1.1' stroke-linejoin='round'/%3E%3Cpath d='M126 15 c2 0 3 0 5 -1 M126 20 c2 -1 3 0 4 1' fill='none' stroke='%23d8d8d8' stroke-width='0.6' stroke-linecap='round'/%3E%3Cpath d='M144 19 l3 -2 l4 1 l1 3 l-2 3 l-4 0 l-3 -2 z' fill='none' stroke='%23d8d8d8' stroke-width='1' stroke-linejoin='round'/%3E%3Cpath d='M151 10 l6 -3 l8 3 l3 6 l-4 6 l-9 0 l-6 -5 l-1 -4 z' fill='none' stroke='%23d8d8d8' stroke-width='1.2' stroke-linejoin='round'/%3E%3Cpath d='M156 11 c3 1 5 0 7 -1 M155 18 c3 -1 5 0 7 2 M164 11 c-2 3 -1 6 1 9' fill='none' stroke='%23d8d8d8' stroke-width='0.68' stroke-linecap='round'/%3E%3Cpath d='M38 20 l2 -1 l3 1 l1 2 l-2 2 l-3 0 l-2 -2 z M94 16 l2 -1 l3 1 l1 2 l-2 2 l-3 0 l-2 -2 z M177 17 l2 -1 l3 1 l1 2 l-2 2 l-3 0 l-2 -2 z' fill='none' stroke='%23d8d8d8' stroke-width='0.9' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: repeat-x;
      background-size: 190px 30px;
      bottom: -14px;
      content: "";
      height: 30px;
      left: 0;
      position: absolute;
      right: 0;
      transform: rotate(0.2deg);
    }

    .post-date {
      color: var(--muted);
      font-size: 0.84rem;
      margin: 0 0 28px;
    }

    h2 {
      font-size: 1.8rem;
      font-weight: 400;
      letter-spacing: 0;
      line-height: 1.25;
      margin: 0;
    }

    .post-card p {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
      margin: 10px 0 0;
    }

    .post-body {
      margin-top: 12px;
    }

    .post-body p {
      color: var(--ink);
      font-size: 1.15rem;
      line-height: 1.65;
    }

    .empty-state {
      color: var(--muted);
      display: none;
      padding: 18px 0;
    }

    .empty-state.is-visible {
      display: block;
    }

    @media (max-width: 560px) {
      .page {
        padding: 30px 20px 58px;
      }

      .search {
        width: 100%;
      }

      .title-section {
        align-items: flex-start;
        flex-direction: column;
        gap: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="title-section" data-home-section>
      <h1>Blog</h1>
      <div class="search" aria-label="Search posts">
        <input id="search" type="search" placeholder="Search posts" autocomplete="off">
      </div>
    </section>

    <section data-home-section>
      <div class="post-list" id="postList" aria-live="polite"></div>
      <div class="empty-state" id="emptyState">No posts match that search.</div>
    </section>
  </main>

  <script>
    const posts = [
      {
        id: "test-post",
        title: "Test Blog Post",
        date: "June 13, 2026",
        excerpt: "A simple test post to confirm new entries show up on the page.",
        body: [
          "This is a test blog post. If you can read this paragraph in the preview, the blog is rendering posts from the page data correctly.",
          "You can replace this text later with a real post."
        ]
      },
      {
        id: "making-room",
        title: "Making Room for Better Drafts",
        date: "June 12, 2026",
        excerpt: "A few practical ways to turn a messy idea into something you can return to tomorrow.",
        body: [
          "The easiest draft to keep working on is the one that leaves a trail. I like to end a writing session by naming the question I was trying to answer, even if the answer is still blurry.",
          "That small note creates a doorway back in. Instead of reopening a document and facing a wall of unfinished thinking, you get a simple invitation: start here.",
          "A good blog can hold that kind of work beautifully. It does not have to be polished to be useful; it just needs enough shape that future-you can find the thread again."
        ]
      },
      {
        id: "designing-home",
        title: "Designing a Home for Small Ideas",
        date: "June 8, 2026",
        excerpt: "Why a blog layout should make reading feel effortless before it tries to look impressive.",
        body: [
          "The strongest blog designs usually feel quiet at first. They give the writing room, make the next action obvious, and avoid turning every paragraph into a performance.",
          "A homepage needs enough structure to invite browsing: titles, dates, excerpts, and a clear way to open the full post. Search matters too, because old ideas become more valuable when they are easy to find.",
          "Visual polish is not decoration here. It is a way of reducing friction so the reader can stay with the thought."
        ]
      },
      {
        id: "launch-notes",
        title: "Launch Notes for a Tiny Website",
        date: "June 1, 2026",
        excerpt: "The small checklist I use before sharing a new personal site with other people.",
        body: [
          "Before sharing a small website, I check the basics: readable type, useful titles, mobile layout, working links, and a page that still makes sense when skimmed.",
          "The best launch version is rarely the biggest version. It is the version with a clear purpose and a few complete paths through it.",
          "Once the foundation works, everything else gets easier to add: categories, a newsletter, comments, images, or a richer post archive."
        ]
      }
    ];

    const postList = document.querySelector("#postList");
    const searchInput = document.querySelector("#search");
    const emptyState = document.querySelector("#emptyState");

    function postCard(post) {
      return `
        <article class="post-card">
          <p class="post-date">${post.date}</p>
          <h2>${post.title}</h2>
          <div class="post-body">
            ${post.body.map(paragraph => `<p>${paragraph}</p>`).join("")}
          </div>
        </article>
      `;
    }

    function renderPosts(items) {
      postList.innerHTML = items.map(postCard).join("");
      emptyState.classList.toggle("is-visible", items.length === 0);
    }

    function filterPosts() {
      const query = searchInput.value.trim().toLowerCase();
      const filtered = posts.filter(post => {
        const searchable = `${post.title} ${post.date} ${post.excerpt} ${post.body.join(" ")}`.toLowerCase();
        return searchable.includes(query);
      });
      renderPosts(filtered);
    }

    searchInput.addEventListener("input", filterPosts);

    renderPosts(posts);
  </script>
</body>
</html>
