<script>
const selectedClimbText = document.getElementById("selected-climb");

const supabaseUrl = "https://ncpjhlvuwuiqwsixpndj.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5jcGpobHZ1d3VpcXdzaXhwbmRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2ODExNTksImV4cCI6MjA5MzI1NzE1OX0.HX0YgA3niwOEBcrd_65n18CdKqDVj6B-X_HJTHxKn4Q";

const supabaseClient = supabase.createClient(
  supabaseUrl,
  supabaseKey,
  {
    auth: {
      persistSession: true,
      autoRefreshToken: true,
      detectSessionInUrl: true,
      storage: window.localStorage
    }
  }
);
const svg = document.getElementById("graph");
const points = document.querySelectorAll(".hit-area");
const averageShape = document.getElementById("average-shape");
const shape = document.getElementById("profile-shape");
const userLogStatus = document.getElementById("user-log-status");
const climbNameInput = document.getElementById("climb-name");
const saveClimbButton = document.getElementById("save-climb");
const deleteLogButton = document.getElementById("delete-log");
const savedClimbsContainer = document.getElementById("saved-climbs");
const climbTypeSelect = document.getElementById("climb-type");
const climbTypeFilter = document.getElementById("climb-type-filter");
const climbAreaInput = document.getElementById("climb-area");
const climbCragInput = document.getElementById("climb-crag");
const climbWallInput = document.getElementById("climb-wall");
const areaFilter = document.getElementById("area-filter");
const cragFilter = document.getElementById("crag-filter");
const wallFilter = document.getElementById("wall-filter");
const authStatus = document.getElementById("auth-status");
const signUpButton = document.getElementById("sign-up");
const signInButton = document.getElementById("sign-in");
const sliders = {
  top: document.getElementById("exposure-slider"),
  left: document.getElementById("risk-slider"),
  right: document.getElementById("consequence-slider")
};
const sliderValues = {
  top: document.getElementById("exposure-value"),
  left: document.getElementById("risk-value"),
  right: document.getElementById("consequence-value")
};

const center = { x: 450, y: 450 };

const axes = {
  top:   { x: 450, y: 90 },
  left:  { x: 138, y: 630 },
  right: { x: 762, y: 630 }
};

let isDragging = false;
let dragAxis = null;
let activePointerId = null;
let selectedClimb = null;
let allClimbs = [];

initializeAuthStatus();

supabaseClient.auth.onAuthStateChange((_event, session) => {
  updateAuthStatus(session);
});

signInButton.addEventListener("click", async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    alert(error.message);
  } else {
    alert("Signed in.");
  }
});
	
signUpButton.addEventListener("click", async () => {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  if (email === "" || password === "") {
    alert("Please enter an email and password.");
    return;
  }

  const { data, error } = await supabaseClient.auth.signUp({
    email,
    password
  });

  if (error) {
    alert(error.message);
    return;
  }

  if (data.session) {
    alert("Account created and signed in.");
  } else {
    alert("Account created. Please check your email to confirm your account.");
  }
});
points.forEach(point => {
  const axisName = point.dataset.axis;

  point.addEventListener("pointerdown", event => {
    isDragging = true;
    dragAxis = axisName;
    activePointerId = event.pointerId;

    svg.setPointerCapture(event.pointerId);

    document.body.style.cursor = "grabbing";
    event.preventDefault();
  });
});

Object.keys(sliders).forEach(axisName => {
  sliders[axisName].addEventListener("input", event => {
    sliderValues[axisName].textContent = event.target.value;

    const point = getPointFromSliderValue(
      axisName,
      Number(event.target.value)
    );

    movePoint(axisName, point.x, point.y);
    updateShape();
  });
});

svg.addEventListener("pointermove", event => {
  if (!isDragging || event.pointerId !== activePointerId) return;

  const mouse = getSvgPoint(event);

  const projected = projectPointOntoAxis(
    mouse,
    center,
    axes[dragAxis]
  );

  movePoint(dragAxis, projected.x, projected.y);
  updateSliderFromPoint(dragAxis);
  updateShape();
});

svg.addEventListener("pointerup", stopDragging);
svg.addEventListener("pointercancel", stopDragging);
svg.addEventListener("lostpointercapture", stopDragging);

function stopDragging() {
  if (activePointerId !== null && svg.hasPointerCapture(activePointerId)) {
    svg.releasePointerCapture(activePointerId);
  }

  isDragging = false;
  dragAxis = null;
  activePointerId = null;
  document.body.style.cursor = "default";
}

saveClimbButton.addEventListener("click", async () => {
  const climbName = climbNameInput.value.trim();

  if (climbName === "") {
    alert("Please enter a climb name.");
    return;
  }

  const { data: userData, error: userError } =
    await supabaseClient.auth.getUser();

  if (userError || !userData.user) {
    alert("Please sign in before saving.");
    return;
  }

  const { data: climb, error: climbError } = await supabaseClient
    .from("climbs")
    .upsert(
      {
        name: climbName,
        created_by: userData.user.id,
        climb_type: climbTypeSelect.value,
        area: climbAreaInput.value.trim(),
        crag: climbCragInput.value.trim(),
        wall: climbWallInput.value.trim()
      },
      {
        onConflict: "name"
      }
    )
    .select("id, name, climb_type, area, crag, wall")
    .single();

  if (climbError) {
    alert(climbError.message);
    return;
  }

  const { error } = await supabaseClient
    .from("climb_graphs")
    .insert({
      climb_name: climbName,
      climb_id: climb.id,
      user_id: userData.user.id,
      top: getPoint("top"),
      left_point: getPoint("left"),
      right_point: getPoint("right")
    });

  if (error) {
    alert(error.message);
  } else {
    selectedClimb = climb;
    selectedClimbText.textContent =
      "Climb name: " + climb.name;
    updateLocationFilterOptions();
    userLogStatus.textContent = "";
    alert("Climb and graph saved.");
    loadClimbsFromSupabase();
  }
});

deleteLogButton.addEventListener("click", async () => {
  if (!selectedClimb) {
    alert("Please select a climb first.");
    return;
  }

  const { data: userData, error: userError } =
    await supabaseClient.auth.getUser();

  if (userError || !userData.user) {
    alert("Please sign in before deleting a log.");
    return;
  }

  const shouldDelete = confirm(
    "Delete your saved log for " + selectedClimb.name + "?"
  );

  if (!shouldDelete) return;

  const { error } = await supabaseClient
    .from("climb_graphs")
    .delete()
    .eq("climb_id", selectedClimb.id)
    .eq("user_id", userData.user.id);

  if (error) {
    alert(error.message);
    return;
  }

  alert("Your log was deleted.");
  loadAverageForClimb(selectedClimb);
  updateUserLogStatus(selectedClimb);
});

climbTypeFilter.addEventListener("change", () => {
  renderClimbList();
});

areaFilter.addEventListener("change", () => {
  renderClimbList();
});

cragFilter.addEventListener("change", () => {
  renderClimbList();
});

wallFilter.addEventListener("change", () => {
  renderClimbList();
});

async function loadClimbsFromSupabase() {
  const { data, error } = await supabaseClient
    .from("climbs")
    .select("id, name, climb_type, area, crag, wall")
    .order("name");

  if (error) {
    alert(error.message);
    return;
  }

  allClimbs = data;
  updateLocationFilterOptions();
  renderClimbList();
}

function renderClimbList() {
  const activeClimbType = climbTypeFilter.value;
  const activeArea = areaFilter.value;
  const activeCrag = cragFilter.value;
  const activeWall = wallFilter.value;
  const climbsToShow = allClimbs.filter(climb => {
    const details = getDetailsForClimb(climb);

    if (activeClimbType !== "" && details.climbType !== activeClimbType) return false;
    if (activeArea !== "" && details.area !== activeArea) return false;
    if (activeCrag !== "" && details.crag !== activeCrag) return false;
    if (activeWall !== "" && details.wall !== activeWall) return false;

    return true;
  });

  savedClimbsContainer.innerHTML = "";

  if (climbsToShow.length === 0) {
    savedClimbsContainer.textContent = "No logged climbs match these filters.";
    return;
  }

  const list = document.createElement("ul");
  list.className = "climb-list";

  const header = document.createElement("li");
  header.className = "climb-list-header";
  ["Climb", "Type", "Area", "Crag/Sector", "Wall"].forEach(label => {
    const column = document.createElement("span");
    column.textContent = label;
    header.appendChild(column);
  });
  list.appendChild(header);

  climbsToShow.forEach(climb => {
    const item = document.createElement("li");
    item.className = "climb-item";

    if (selectedClimb && selectedClimb.id === climb.id) {
      item.classList.add("selected");
    }

    const name = document.createElement("span");
    name.className = "climb-name";
    name.textContent = climb.name;

    const details = getDetailsForClimb(climb);
    const columns = [
      details.climbType,
      details.area,
      details.crag,
      details.wall
    ];

    item.appendChild(name);

    columns.forEach(value => {
      const column = document.createElement("span");
      column.className = "climb-column";
      column.textContent = value || "-";
      item.appendChild(column);
    });

    item.addEventListener("click", async () => {
      selectedClimb = climb;
      selectedClimbText.textContent =
        "Climb name: " + climb.name;
      climbNameInput.value = climb.name;
      setDetailInputsForClimb(climb);
      renderClimbList();
      loadAverageForClimb(climb);
      updateUserLogStatus(climb);
    });

    list.appendChild(item);
  });

  savedClimbsContainer.appendChild(list);
}

function getDetailsForClimb(climb) {
  return {
    climbType: climb.climb_type || "",
    area: climb.area || "",
    crag: climb.crag || "",
    wall: climb.wall || ""
  };
}

function setDetailInputsForClimb(climb) {
  const details = getDetailsForClimb(climb);

  climbTypeSelect.value = details.climbType;
  climbAreaInput.value = details.area;
  climbCragInput.value = details.crag;
  climbWallInput.value = details.wall;
}

function updateLocationFilterOptions() {
  updateFilterOptions(areaFilter, "All areas", "area");
  updateFilterOptions(cragFilter, "All crags/sectors", "crag");
  updateFilterOptions(wallFilter, "All walls", "wall");
}

function updateFilterOptions(filterElement, defaultLabel, detailKey) {
  const currentValue = filterElement.value;
  const values = new Set();

  allClimbs.forEach(climb => {
    const value = getDetailsForClimb(climb)[detailKey];
    if (value !== "") values.add(value);
  });

  filterElement.innerHTML = "";

  const defaultOption = document.createElement("option");
  defaultOption.value = "";
  defaultOption.textContent = defaultLabel;
  filterElement.appendChild(defaultOption);

  Array.from(values).sort().forEach(value => {
    const option = document.createElement("option");
    option.value = value;
    option.textContent = value;
    filterElement.appendChild(option);
  });

  filterElement.value = values.has(currentValue) ? currentValue : "";
}

async function updateUserLogStatus(climb) {
  userLogStatus.textContent = "";

  const { data: userData, error: userError } =
    await supabaseClient.auth.getUser();

  if (userError || !userData.user) return;

  const { data, error } = await supabaseClient
    .from("climb_graphs")
    .select("id")
    .eq("climb_id", climb.id)
    .eq("user_id", userData.user.id)
    .limit(1);

  if (error) {
    alert(error.message);
    return;
  }

  if (!data || data.length === 0) {
    userLogStatus.textContent =
      "(No recorded log for this climb)";
  }
}

async function loadAverageForClimb(climb) {
  const { data, error } = await supabaseClient
    .from("climb_graphs")
    .select("top, left_point, right_point")
    .eq("climb_id", climb.id);

  if (error) {
    alert(error.message);
    return;
  }

  if (!data || data.length === 0) {
    averageShape.removeAttribute("d");
    alert("No graphs saved for this climb yet.");
    return;
  }

  const avgTop = averagePoints(
    data.map(row => row.top)
  );

  const avgLeft = averagePoints(
    data.map(row => row.left_point)
  );

  const avgRight = averagePoints(
    data.map(row => row.right_point)
  );

  drawAverageShape(avgTop, avgLeft, avgRight);
}

syncSlidersFromPoints();
updateShape();
loadClimbsFromSupabase();

async function initializeAuthStatus() {
  const { data, error } = await supabaseClient.auth.getSession();

  if (error) {
    authStatus.textContent = "Not signed in";
    return;
  }

  updateAuthStatus(data.session);
}

function updateAuthStatus(session) {
  if (session && session.user) {
    authStatus.textContent =
      "Signed in as " + session.user.email;
  } else {
    authStatus.textContent = "Not signed in";
  }
}

function movePoint(axisName, x, y) {
  const hitArea = document.querySelector(
    `.hit-area[data-axis="${axisName}"]`
  );

  const visiblePoint = document.querySelector(
    `.visible-point[data-axis="${axisName}"]`
  );

  hitArea.setAttribute("cx", x);
  hitArea.setAttribute("cy", y);

  visiblePoint.setAttribute("cx", x);
  visiblePoint.setAttribute("cy", y);
}

function updateSliderFromPoint(axisName) {
  const value = Math.round(getAxisRatio(getPoint(axisName), axes[axisName]) * 100);

  sliders[axisName].value = value;
  sliderValues[axisName].textContent = value;
}

function syncSlidersFromPoints() {
  Object.keys(sliders).forEach(axisName => {
    updateSliderFromPoint(axisName);
  });
}

function getPointFromSliderValue(axisName, value) {
  const ratio = value / 100;
  const axisEnd = axes[axisName];

  return {
    x: center.x + (axisEnd.x - center.x) * ratio,
    y: center.y + (axisEnd.y - center.y) * ratio
  };
}

function updateShape() {
  const top = getPoint("top");
  const left = getPoint("left");
  const right = getPoint("right");

  const d = `
    M ${top.x} ${top.y}
    Q ${center.x} ${center.y} ${left.x} ${left.y}
    Q ${center.x} ${center.y} ${right.x} ${right.y}
    Q ${center.x} ${center.y} ${top.x} ${top.y}
    Z
  `;

  shape.setAttribute("d", d);
}

function getPoint(axisName) {
  const point = document.querySelector(
    `.visible-point[data-axis="${axisName}"]`
  );

  return {
    x: Number(point.getAttribute("cx")),
    y: Number(point.getAttribute("cy"))
  };
}

function getAxisRatio(point, axisEnd) {
  const dxTotal = axisEnd.x - center.x;
  const dyTotal = axisEnd.y - center.y;

  const dxPoint = point.x - center.x;
  const dyPoint = point.y - center.y;

  const totalDistance = Math.sqrt(
    dxTotal * dxTotal + dyTotal * dyTotal
  );

  const pointDistance = Math.sqrt(
    dxPoint * dxPoint + dyPoint * dyPoint
  );

  return pointDistance / totalDistance;
}

function drawAverageShape(top, left, right) {
  const d = `
    M ${top.x} ${top.y}
    Q ${center.x} ${center.y} ${left.x} ${left.y}
    Q ${center.x} ${center.y} ${right.x} ${right.y}
    Q ${center.x} ${center.y} ${top.x} ${top.y}
    Z
  `;

  averageShape.setAttribute("d", d);
}

function averagePoints(points) {
  const total = points.reduce(
    (sum, point) => {
      sum.x += point.x;
      sum.y += point.y;
      return sum;
    },
    { x: 0, y: 0 }
  );

  return {
    x: total.x / points.length,
    y: total.y / points.length
  };
}

function projectPointOntoAxis(mouse, start, end) {
  const dx = end.x - start.x;
  const dy = end.y - start.y;

  const lengthSquared = dx * dx + dy * dy;

  let t =
    ((mouse.x - start.x) * dx +
     (mouse.y - start.y) * dy) /
    lengthSquared;

  t = Math.max(0, Math.min(1, t));

  return {
    x: start.x + t * dx,
    y: start.y + t * dy
  };
}

function getSvgPoint(event) {
  const point = svg.createSVGPoint();
  point.x = event.clientX;
  point.y = event.clientY;

  return point.matrixTransform(svg.getScreenCTM().inverse());
}
